<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Import Maps + MFE</title>

  <!-- Single Tailwind build — scans all MFE source dirs, ships one CSS file -->
  <link rel="stylesheet" href="/styles.css" />

  <!--
    SINGLE SOURCE OF TRUTH for every shared dependency.
    Both MFE bundles say `import React from "react"` in their minified output.
    The browser resolves that bare specifier HERE — not inside the bundle.
    ?external=react  →  tells esm.sh "don't bundle React, import it as bare specifier"
                        so the browser resolves it via THIS import map = same instance.
  -->
  <script type="importmap">
    {
      "imports": {
        "react":              "https://esm.sh/react@18.3.1",
        "react/jsx-runtime":  "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom":          "https://esm.sh/react-dom@18.3.1?external=react",
        "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client?external=react",
        "zustand":          "https://esm.sh/zustand@4.5.5?external=react",
        "zustand/vanilla":  "https://esm.sh/zustand@4.5.5/vanilla",
        "moment":           "https://esm.sh/moment@2.30.1",
        "shared/store":     "/shared/store.js"
      }
    }
  </script>
</head>
<body class="max-w-xl mx-auto mt-10 p-4 space-y-4">
  <h2 class="text-xl font-bold">Import Maps — Vite-built MFEs</h2>

  <div id="app-header" class="bg-blue-50 p-4 rounded-lg"></div>
  <div id="app-dashboard" class="bg-green-50 p-4 rounded-lg"></div>

  <!-- Each MFE is a Vite-built, minified ES module.         -->
  <!-- Internally: vars are mangled (a, b, x).                -->
  <!-- Externally: `import React from "react"` stays verbatim -->
  <!--             because React is marked as "external".     -->
  <script type="module" src="/mfe/header/index.js"></script>
  <script type="module" src="/mfe/dashboard/index.js"></script>
</body>
</html>
